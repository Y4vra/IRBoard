
- id: "kratos-self-service-pass"
  match:
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
    url: "http://auth.irboard.local/<.*>"
  authenticators:
    - handler: "noop"
  authorizer:
    handler: "allow"
  mutators:
    - handler: "noop"
  upstream:
    url: "http://kratos:4433" 
    preserve_host: true

- id: "api-backend-activate-public"
  match:
    methods: ["POST", "OPTIONS"]
    url: "http://api.irboard.local/v1/auth/activate"
  authenticators:
    - handler: "noop"
  authorizer:
    handler: "allow"
  mutators:
    - handler: "noop"
  upstream:
    url: "http://backend:8080"
    preserve_host: true

- id: "api-backend-protected"
  match:
    methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]
    url: "http://api.irboard.local/v1/<(users|home|projects|whoami|locks).*>"
  authenticators:
    - handler: "cookie_session"
  authorizer:
    handler: "allow"
  mutators:
    - handler: "header"
      config:
        headers:
          X-User: "{{ .Subject }}"
  upstream:
    url: "http://backend:8080"

- id: "grafana-protected"
  match:
    methods: ["GET", "POST"]
    url: "http://grafana.irboard.local/<.*>"
  authenticators:
    - handler: "cookie_session"
  authorizer:
    handler: "remote_json"
    config:
      remote: "http://keto:4466/relation-tuples/check/openapi"
      payload: |
        {
          "namespace": "User",
          "object": "System",
          "relation": "admin",
          "subject_id": "{{ print .Subject }}"
        }
  mutators:
    - handler: "noop"
  upstream:
    url: "http://grafana:3000"