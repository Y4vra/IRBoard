<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowOpen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#6366F1" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="900" height="700" fill="#FFFFFF"/>
  <text x="450" y="30" font-size="16" font-weight="700" fill="#1E293B" text-anchor="middle">IR-Board Backend – Hexagonal Architecture</text>

  <!-- ===== INFRASTRUCTURE (outer hexagon) ===== -->
  <!-- Hexagon: center 450,360, radius ~290 -->
  <polygon
    points="450,72 701,217 701,507 450,652 199,507 199,217"
    fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
  <text x="450" y="100" font-size="13" font-weight="700" fill="#C2410C" text-anchor="middle">Infrastructure</text>

  <!-- ===== APPLICATION (middle hexagon) ===== -->
  <polygon
    points="450,168 626,270 626,474 450,576 274,474 274,270"
    fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
  <text x="450" y="193" font-size="13" font-weight="700" fill="#15803D" text-anchor="middle">Application</text>

  <!-- ===== DOMAIN (inner hexagon) ===== -->
  <polygon
    points="450,258 554,316 554,432 450,490 346,432 346,316"
    fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
  <text x="450" y="278" font-size="13" font-weight="700" fill="#4338CA" text-anchor="middle">Domain</text>

  <!-- ===== DOMAIN contents ===== -->
  <text x="450" y="308" font-size="10" fill="#4338CA" text-anchor="middle">model</text>
  <text x="450" y="322" font-size="10" fill="#4338CA" text-anchor="middle">repository interfaces</text>
  <text x="450" y="336" font-size="10" fill="#4338CA" text-anchor="middle">error</text>
  <text x="450" y="350" font-size="10" fill="#4338CA" text-anchor="middle">EntitySlugService</text>

  <!-- ===== APPLICATION contents ===== -->
  <!-- Ports (left) -->
  <rect x="285" y="318" width="52" height="96" rx="6" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.3"/>
  <text x="311" y="336" font-size="9" fill="#15803D" text-anchor="middle" font-weight="700">«port»</text>
  <text x="311" y="350" font-size="9" fill="#15803D" text-anchor="middle">Identity</text>
  <text x="311" y="362" font-size="9" fill="#15803D" text-anchor="middle">Service</text>
  <text x="311" y="378" font-size="9" fill="#15803D" text-anchor="middle">Permission</text>
  <text x="311" y="390" font-size="9" fill="#15803D" text-anchor="middle">Service</text>
  <text x="311" y="404" font-size="9" fill="#15803D" text-anchor="middle">ObjectStorage</text>
  <text x="311" y="416" font-size="9" fill="#15803D" text-anchor="middle">Service</text>

  <!-- Services (right) -->
  <rect x="563" y="278" width="52" height="180" rx="6" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.3"/>
  <text x="589" y="296" font-size="9" fill="#15803D" text-anchor="middle" font-weight="700">services</text>
  <text x="589" y="312" font-size="9" fill="#15803D" text-anchor="middle">Project</text>
  <text x="589" y="326" font-size="9" fill="#15803D" text-anchor="middle">Requirement</text>
  <text x="589" y="340" font-size="9" fill="#15803D" text-anchor="middle">Stakeholder</text>
  <text x="589" y="354" font-size="9" fill="#15803D" text-anchor="middle">Document</text>
  <text x="589" y="368" font-size="9" fill="#15803D" text-anchor="middle">Functionality</text>
  <text x="589" y="382" font-size="9" fill="#15803D" text-anchor="middle">EntityLock</text>
  <text x="589" y="396" font-size="9" fill="#15803D" text-anchor="middle">User</text>
  <text x="589" y="410" font-size="9" fill="#15803D" text-anchor="middle">Search</text>

  <!-- DTOs / mappers (bottom of application band) -->
  <rect x="360" y="502" width="180" height="40" rx="6" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.3"/>
  <text x="450" y="519" font-size="9" fill="#15803D" text-anchor="middle" font-weight="700">dto · mapper</text>
  <text x="450" y="533" font-size="9" fill="#15803D" text-anchor="middle">ProjectDTO · RequirementDTO · StakeholderDTO · DocumentDTO</text>

  <!-- ===== INFRASTRUCTURE contents ===== -->

  <!-- REST API (top) -->
  <rect x="340" y="78" width="220" height="62" rx="6" fill="#FFEDD5" stroke="#F97316" stroke-width="1.3"/>
  <text x="450" y="97" font-size="10" fill="#C2410C" text-anchor="middle" font-weight="700">REST API (controllers)</text>
  <text x="450" y="111" font-size="9" fill="#C2410C" text-anchor="middle">Project · Requirement · Stakeholder</text>
  <text x="450" y="124" font-size="9" fill="#C2410C" text-anchor="middle">Document · Functionality · User · Search</text>

  <!-- Clients (left) -->
  <rect x="210" y="290" width="58" height="100" rx="6" fill="#FFEDD5" stroke="#F97316" stroke-width="1.3"/>
  <text x="239" y="308" font-size="9" fill="#C2410C" text-anchor="middle" font-weight="700">clients</text>
  <text x="239" y="322" font-size="9" fill="#C2410C" text-anchor="middle">Kratos</text>
  <text x="239" y="336" font-size="9" fill="#C2410C" text-anchor="middle">Client</text>
  <text x="239" y="354" font-size="9" fill="#C2410C" text-anchor="middle">Keto</text>
  <text x="239" y="368" font-size="9" fill="#C2410C" text-anchor="middle">Client</text>
  <text x="239" y="386" font-size="9" fill="#C2410C" text-anchor="middle">Minio</text>
  <text x="239" y="400" font-size="9" fill="#C2410C" text-anchor="middle">Client</text>

  <!-- Persistence (right) -->
  <rect x="632" y="290" width="62" height="120" rx="6" fill="#FFEDD5" stroke="#F97316" stroke-width="1.3"/>
  <text x="663" y="308" font-size="9" fill="#C2410C" text-anchor="middle" font-weight="700">persistence</text>
  <text x="663" y="322" font-size="9" fill="#C2410C" text-anchor="middle">JpaProject</text>
  <text x="663" y="336" font-size="9" fill="#C2410C" text-anchor="middle">JpaReq.</text>
  <text x="663" y="350" font-size="9" fill="#C2410C" text-anchor="middle">JpaStakeh.</text>
  <text x="663" y="364" font-size="9" fill="#C2410C" text-anchor="middle">JpaDoc.</text>
  <text x="663" y="378" font-size="9" fill="#C2410C" text-anchor="middle">JpaLock</text>

  <!-- Config (bottom) -->
  <rect x="340" y="590" width="220" height="40" rx="6" fill="#FFEDD5" stroke="#F97316" stroke-width="1.3"/>
  <text x="450" y="607" font-size="10" fill="#C2410C" text-anchor="middle" font-weight="700">config</text>
  <text x="450" y="621" font-size="9" fill="#C2410C" text-anchor="middle">SecurityConfig · MinioConfig · KratosConfig · KetoConfig</text>

  <!-- ===== EXTERNAL actors ===== -->

  <!-- Browser -->
  <rect x="355" y="648" width="190" height="34" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.3"/>
  <text x="450" y="670" font-size="11" fill="#475569" text-anchor="middle">Browser / Frontend</text>

  <!-- Ory Kratos -->
  <rect x="44" y="310" width="78" height="34" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.3"/>
  <text x="83" y="332" font-size="10" fill="#475569" text-anchor="middle">Ory Kratos</text>

  <!-- Ory Keto -->
  <rect x="44" y="355" width="78" height="34" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.3"/>
  <text x="83" y="377" font-size="10" fill="#475569" text-anchor="middle">Ory Keto</text>

  <!-- MinIO -->
  <rect x="44" y="400" width="78" height="34" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.3"/>
  <text x="83" y="422" font-size="10" fill="#475569" text-anchor="middle">MinIO</text>

  <!-- PostgreSQL -->
  <rect x="778" y="330" width="88" height="34" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.3"/>
  <text x="822" y="352" font-size="10" fill="#475569" text-anchor="middle">PostgreSQL</text>

  <!-- ===== ARROWS ===== -->

  <!-- Browser -> REST API -->
  <line x1="450" y1="648" x2="450" y2="142" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="465" y="618" font-size="9" fill="#475569">HTTP</text>

  <!-- REST controllers -> Application services -->
  <line x1="450" y1="140" x2="563" y2="310" stroke="#475569" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Application services -> Domain -->
  <line x1="554" y1="374" x2="554" y2="374" stroke="none"/>
  <line x1="563" y1="360" x2="554" y2="374" stroke="#6366F1" stroke-width="1.3" marker-end="url(#arrowOpen)"/>

  <!-- Ports -> Clients (implements) -->
  <line x1="285" y1="360" x2="268" y2="360" stroke="#475569" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Clients -> external services -->
  <line x1="210" y1="327" x2="122" y2="327" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="210" y1="372" x2="122" y2="372" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="210" y1="417" x2="122" y2="417" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Persistence -> PostgreSQL -->
  <line x1="694" y1="350" x2="778" y2="350" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Domain repositories -> Persistence (implements) -->
  <line x1="615" y1="360" x2="632" y2="360" stroke="#6366F1" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrowOpen)"/>

  <!-- ===== LEGEND ===== -->
  <rect x="44" y="560" width="200" height="80" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="54" y="578" font-size="10" font-weight="700" fill="#1E293B">Legend</text>
  <line x1="54" y1="594" x2="90" y2="594" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="96" y="598" font-size="9" fill="#475569">calls / uses</text>
  <line x1="54" y1="614" x2="90" y2="614" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="96" y="618" font-size="9" fill="#475569">delegates to</text>
  <line x1="54" y1="634" x2="90" y2="634" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowOpen)"/>
  <text x="96" y="638" font-size="9" fill="#475569">implements</text>

</svg>