  <text x="405" y="55" font-size="11" fill="#475569" text-anchor="middle">auth error</text>

  <!-- Public <-> Authenticated -->
  <line x1="480" y1="210" x2="480" y2="259" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="455" y="236" font-size="11" fill="#475569" text-anchor="middle">login</text>

  <line x1="540" y1="259" x2="540" y2="210" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
