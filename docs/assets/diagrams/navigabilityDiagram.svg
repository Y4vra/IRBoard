  <line x1="960" y1="671" x2="960" y2="680" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="980" y1="716" x2="980" y2="725" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="940" y1="725" x2="940" y2="716" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1000" y="722" font-size="10" fill="#475569" text-anchor="middle">edit</text>

