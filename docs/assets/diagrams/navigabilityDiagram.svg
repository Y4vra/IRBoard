  <line x1="830" y1="704" x2="750" y2="704" stroke="#0EA5E9" stroke-width="1.4" marker-end="url(#arrowSky)"/>

  <line x1="1090" y1="704" x2="1170" y2="709" stroke="#0EA5E9" stroke-width="1.4" marker-end="url(#arrowSky)"/>

  <path d="M280,716 C 280,840 1290,840 1290,721" fill="none" stroke="#0EA5E9" stroke-width="1.4" marker-end="url(#arrowSky)"/>

  <path d="M960,716 C 960,815 280,815 280,716" fill="none" stroke="#0EA5E9" stroke-width="1.4" marker-end="url(#arrowSky)"/>

  <path d="M350,680 C 360,650 400,650 410,680" fill="none" stroke="#0EA5E9" stroke-width="1.4" marker-end="url(#arrowSky)"/>

  <text x="60" y="862" font-size="11" font-style="italic" fill="#0EA5E9">Sky-blue links: cross-entity references (requirement ↔ stakeholder / document / peer requirement).</text>

</svg>