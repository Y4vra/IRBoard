<svg viewBox="0 0 1560 900" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrowIndigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6366F1"/>
    </marker>
    <marker id="arrowSky" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0EA5E9"/>
    </marker>
  </defs>

  <rect width="1560" height="900" fill="#FFFFFF"/>
  <text x="40" y="26" font-size="18" font-weight="700" fill="#1E293B">IR-Board – Navigability Diagram</text>

  <!-- ============ PUBLIC AREA ============ -->
  <rect x="40" y="40" width="960" height="170" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="60" y="62" font-size="13" font-weight="700" fill="#64748B">Public Area</text>

  <rect x="90" y="95" width="170" height="50" rx="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="175" y="125" font-size="13" fill="#1E293B" text-anchor="middle">Login</text>

  <rect x="320" y="95" width="170" height="50" rx="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="405" y="125" font-size="13" fill="#1E293B" text-anchor="middle">Registration</text>

  <rect x="550" y="95" width="170" height="50" rx="8" fill="#FFFFFF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="635" y="125" font-size="13" fill="#1E293B" text-anchor="middle">Error Page</text>

  <line x1="260" y1="112" x2="320" y2="112" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
