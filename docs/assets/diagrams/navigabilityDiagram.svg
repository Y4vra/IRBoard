  <line x1="790" y1="490" x2="620" y2="598" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="620" y1="598" x2="790" y2="490" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>

  <line x1="790" y1="490" x2="960" y2="598" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="960" y1="598" x2="790" y2="490" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>

  <line x1="790" y1="490" x2="1290" y2="598" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="1290" y1="598" x2="790" y2="490" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Slug search shortcut into project context -->
