  <text x="1430" y="406" font-size="10" fill="#6366F1" text-anchor="end">Functionality / Document</text>

  <!-- Global NavBar reachability note -->
  <text x="60" y="845" font-size="11" font-style="italic" fill="#64748B">Home, Diagrams and User Management are reachable at any time via the persistent NavBar.</text>

  <!-- Authenticated -> ErrorPage / ErrorPage -> Home -->
  <path d="M1520,260 C 1545,150 900,75 720,118" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
