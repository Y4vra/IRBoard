networks:
  public:
    driver: bridge
  internal:
    driver: bridge

services:
  # --- GATEWAY ---
  traefik:
    image: traefik:v2.10
    container_name: traefik
    command:
      - "--log.level=DEBUG"
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.minio.address=:9000"
      - "--entrypoints.minio-api.address=:9001"
    ports:
      - "80:80"
      - "8080:8080"
      - "9000:9000"
      - "9001:9001"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - public

  # --- MIGRATION (PREPARE ORY TABLES) ---
  keto-migrate:
    image: oryd/keto:v25.4.0
    depends_on:
      keto-db:
        condition: service_healthy
    environment:
      - DSN=postgres://${KETO_DB_USER}:${KETO_DB_PASSWORD}@keto-db:5432/${KETO_DB_NAME}?sslmode=disable
    volumes:
      - ./config/keto:/etc/config/keto
    command: -c /etc/config/keto/keto.yaml migrate up --yes
    networks:
      - internal
  kratos-migrate:
    build:
      context: ./config/kratos
    environment:
      - DSN=postgres://${KRATOS_DB_USER}:${KRATOS_DB_PASSWORD}@kratos-db:5432/${KRATOS_DB_NAME}?sslmode=disable
      - DOMAIN_NAME=${DOMAIN_NAME}
      - AUTH_DOMAIN=${AUTH_DOMAIN}
      - SERVE_PUBLIC_BASE_URL=http://${AUTH_DOMAIN}/
      - SERVE_ADMIN_BASE_URL=http://kratos:4434/
      - SESSIONS_COOKIE_SECURE=false
      - SELFSERVICE_ALLOWED_RETURN_URLS=http://${DOMAIN_NAME}
      - SELFSERVICE_DEFAULT_BROWSER_RETURN_URL=http://${DOMAIN_NAME}/home
      - SELFSERVICE_FLOWS_ERROR_UI_URL=http://${DOMAIN_NAME}/error
      - SELFSERVICE_FLOWS_LOGIN_UI_URL=http://${DOMAIN_NAME}/login
      - SELFSERVICE_FLOWS_REGISTRATION_UI_URL=http://${DOMAIN_NAME}/registration
      - SELFSERVICE_FLOWS_SETTINGS_UI_URL=http://${DOMAIN_NAME}/settings
      - SELFSERVICE_FLOWS_RECOVERY_UI_URL=http://${DOMAIN_NAME}/setup-password
      - SELFSERVICE_FLOWS_LOGOUT_AFTER_DEFAULT_BROWSER_RETURN_URL=http://${DOMAIN_NAME}/login
    volumes:
      - ./config/kratos:/etc/config/kratos
    command:
      - migrate
      - sql
      - -e
      - --yes
    depends_on:
      kratos-db:
        condition: service_healthy
    networks:
      - internal

  # --- IDENTITY (ORY) ---
  kratos-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${KRATOS_DB_USER}
      - POSTGRES_PASSWORD=${KRATOS_DB_PASSWORD}
      - POSTGRES_DB=${KRATOS_DB_NAME}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KRATOS_DB_USER} -d ${KRATOS_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db_data_kratos:/var/lib/postgresql/data
  keto-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${KETO_DB_USER}
      - POSTGRES_PASSWORD=${KETO_DB_PASSWORD}
      - POSTGRES_DB=${KETO_DB_NAME}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KETO_DB_USER} -d ${KETO_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db_data_keto:/var/lib/postgresql/data

  kratos:
    build:
      context: ./config/kratos
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
      kratos-db:
        condition: service_healthy
      smtp-server:
        condition: service_healthy
    environment:
      - DSN=postgres://${KRATOS_DB_USER}:${KRATOS_DB_PASSWORD}@kratos-db:5432/${KRATOS_DB_NAME}?sslmode=disable
      - DOMAIN_NAME=${DOMAIN_NAME}
      - AUTH_DOMAIN=${AUTH_DOMAIN}
      - SERVE_PUBLIC_BASE_URL=http://${AUTH_DOMAIN}/
      - SERVE_ADMIN_BASE_URL=http://kratos:4434/
      - SESSIONS_COOKIE_SECURE=false
      - SELFSERVICE_ALLOWED_RETURN_URLS=http://${DOMAIN_NAME}
      - SELFSERVICE_DEFAULT_BROWSER_RETURN_URL=http://${DOMAIN_NAME}/home
      - SELFSERVICE_FLOWS_ERROR_UI_URL=http://${DOMAIN_NAME}/error
      - SELFSERVICE_FLOWS_LOGIN_UI_URL=http://${DOMAIN_NAME}/login
      - SELFSERVICE_FLOWS_REGISTRATION_UI_URL=http://${DOMAIN_NAME}/registration
      - SELFSERVICE_FLOWS_SETTINGS_UI_URL=http://${DOMAIN_NAME}/settings
      - SELFSERVICE_FLOWS_RECOVERY_UI_URL=http://${DOMAIN_NAME}/setup-password
      - SELFSERVICE_FLOWS_LOGOUT_AFTER_DEFAULT_BROWSER_RETURN_URL=http://${DOMAIN_NAME}/login
    volumes:
      - ./config/kratos:/etc/config/kratos
    command:
      - serve
      - --dev
    networks:
      - internal

  kratos-courier:
    build:
      context: ./config/kratos
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
      kratos-db:
        condition: service_healthy
      smtp-server:
        condition: service_healthy
    environment:
      - DSN=postgres://${KRATOS_DB_USER}:${KRATOS_DB_PASSWORD}@kratos-db:5432/${KRATOS_DB_NAME}?sslmode=disable
      - DOMAIN_NAME=${DOMAIN_NAME}
      - AUTH_DOMAIN=${AUTH_DOMAIN}
      - SERVE_PUBLIC_BASE_URL=http://${AUTH_DOMAIN}/
      - SERVE_ADMIN_BASE_URL=http://kratos:4434/
      - SESSIONS_COOKIE_SECURE=false

      - SELFSERVICE_ALLOWED_RETURN_URLS=http://${DOMAIN_NAME}
      - SELFSERVICE_DEFAULT_BROWSER_RETURN_URL=http://${DOMAIN_NAME}/home
      - SELFSERVICE_FLOWS_ERROR_UI_URL=http://${DOMAIN_NAME}/error
      - SELFSERVICE_FLOWS_LOGIN_UI_URL=http://${DOMAIN_NAME}/login
      - SELFSERVICE_FLOWS_REGISTRATION_UI_URL=http://${DOMAIN_NAME}/registration
      - SELFSERVICE_FLOWS_SETTINGS_UI_URL=http://${DOMAIN_NAME}/settings
      - SELFSERVICE_FLOWS_RECOVERY_UI_URL=http://${DOMAIN_NAME}/setup-password
      - SELFSERVICE_FLOWS_LOGOUT_AFTER_DEFAULT_BROWSER_RETURN_URL=http://${DOMAIN_NAME}/login
    volumes:
      - ./config/kratos:/etc/config/kratos
    command:
      - courier
      - watch
    networks:
      - internal

  keto:
    image: oryd/keto:v25.4.0
    depends_on:
      keto-migrate:
        condition: service_completed_successfully
      keto-db:
        condition: service_healthy
    environment:
      - DSN=postgres://${KETO_DB_USER}:${KETO_DB_PASSWORD}@keto-db:5432/${KETO_DB_NAME}?sslmode=disable
    volumes:
      - ./config/keto:/etc/config/keto
    command: serve -c /etc/config/keto/keto.yaml
    networks:
      - internal

  oathkeeper:
    build:
      context: ./config/oathkeeper
      dockerfile: Dockerfile
    depends_on:
      - kratos
      - keto
    env_file:
      - .env
    environment:
      - SERVE_PROXY_CORS_ALLOWED_ORIGINS=http://${DOMAIN_NAME}
      - AUTHENTICATORS_COOKIE_SESSION_CONFIG_CHECK_SESSION_URL=http://kratos:4433/sessions/whoami
      - AUTHORIZERS_REMOTE_JSON_CONFIG_REMOTE=http://keto:4466/relation-tuples/check/openapi
      - ERRORS_HANDLERS_REDIRECT_CONFIG_TO=http://${DOMAIN_NAME}/login
    volumes:
      - ./config/oathkeeper:/etc/config/oathkeeper
    networks:
      - public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oathkeeper.rule=Host(`${AUTH_DOMAIN}`) || Host(`${API_DOMAIN}`) "
      - "traefik.http.services.oathkeeper.loadbalancer.server.port=4455"
      - "traefik.docker.network=irboard_public"

      # rate limiting on traefik to prevent dictionary attacks
      - "traefik.http.middlewares.kratos-ratelimit.ratelimit.average=60"
      - "traefik.http.middlewares.kratos-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.kratos-ratelimit.ratelimit.burst=20"
      
      - "traefik.http.routers.kratos-login.rule=Host(`${AUTH_DOMAIN}`) && PathPrefix(`/self-service/login`)"
      - "traefik.http.routers.kratos-login.entrypoints=web"
      - "traefik.http.routers.kratos-login.middlewares=kratos-ratelimit"
      - "traefik.http.routers.kratos-login.service=oathkeeper"

      - "traefik.http.routers.oathkeeper.entrypoints=web"
      
      # Mantenemos el puerto interno de Oathkeeper (proxy)
      - "traefik.http.services.oathkeeper.loadbalancer.server.port=4455"


  # --- DEVELOPMENT ONLY, INSERTS ADMIN USER FOR FIRST TIME USE ON KRATOS, KETO, AND BACKEND ---
  initial-setup-admin:
    build: ./config/initial-setup-admin
    depends_on:
      kratos:
        condition: service_started
      keto:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - internal
    environment:
      - KRATOS_URL=http://kratos:4434/admin/identities
      - KETO_URL=http://keto:4467/admin/relation-tuples
      - DB_USER=${RMS_DB_USER}
      - DB_PASS=${RMS_DB_PASSWORD}
      - DB_NAME=${RMS_DB_NAME}
      - ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL}
      - ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD}
      - ADMIN_NAME=${INITIAL_ADMIN_NAME}
      - ADMIN_SURNAME=${INITIAL_ADMIN_SURNAME}
    

  # --- BUSINESS LOGIC ---
  backend-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${RMS_DB_USER}
      - POSTGRES_PASSWORD=${RMS_DB_PASSWORD}
      - POSTGRES_DB=${RMS_DB_NAME}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RMS_DB_USER} -d ${RMS_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
    - db_data_rms:/var/lib/postgresql/data
  
  object-storage:
    image: minio/minio
    networks:
      public:
        aliases:
          - ${OBJS_DOMAIN}
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${OBJ_STORAGE_USER}
      - MINIO_ROOT_PASSWORD=${OBJ_STORAGE_PASS}
      - MINIO_BROWSER_REDIRECT_URL=http://${OBJS_DOMAIN}:9001
      - MINIO_SERVER_URL=http://${OBJS_DOMAIN}:9000
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=irboard_public" 
      
      - "traefik.http.routers.minio-api.rule=Host(`${OBJS_DOMAIN}`)"
      - "traefik.http.routers.minio-api.entrypoints=minio"
      - "traefik.http.routers.minio-api.service=minio-api-svc"
      - "traefik.http.services.minio-api-svc.loadbalancer.server.port=9000"

      - "traefik.http.routers.minio-console.rule=Host(`${OBJS_DOMAIN}`)"
      - "traefik.http.routers.minio-console.entrypoints=minio-api"
      - "traefik.http.routers.minio-console.service=minio-console-svc"
      - "traefik.http.services.minio-console-svc.loadbalancer.server.port=9001"

  object-storage-client:
    image: minio/mc
    depends_on:
      object-storage:
        condition: service_healthy
    networks:
      - public
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://${OBJS_DOMAIN}:9000 ${OBJ_STORAGE_USER} ${OBJ_STORAGE_PASS}) do sleep 1; done;
      /usr/bin/mc mb myminio/documents;
      exit 0;
      "

  backend:
    build:
      context: ./backend
    depends_on:
      backend-db:
        condition: service_healthy
      object-storage: 
        condition: service_healthy
    environment:
      - KETO_READ_URL=http://keto:4466
      - KETO_WRITE_URL=http://keto:4467
      - KRATOS_PUBLIC_URL=http://kratos:4433
      - KRATOS_ADMIN_URL=http://kratos:4434
      - KRATOS_ADMIN_API_KEY=dummy_value # unnecessary due to local deployment but added for future extension purposes.
      - OBJ_STORAGE_URL=http://${OBJS_DOMAIN}:9000
      - OBJ_STORAGE_USER=${OBJ_STORAGE_USER}
      - OBJ_STORAGE_PASS=${OBJ_STORAGE_PASS}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://backend-db:5432/${RMS_DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${RMS_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${RMS_DB_PASSWORD}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 300s
    extra_hosts:
      - "${OBJS_DOMAIN}:host-gateway"

  frontend:
    build: 
      context: ./frontend
      args:
        VITE_DOMAIN_NAME: ${DOMAIN_NAME}
        VITE_AUTH_DOMAIN: ${AUTH_DOMAIN}
        VITE_API_DOMAIN: ${API_DOMAIN}
        VITE_DRAWIO_URL: ${DRAWIO_DOMAIN}
    networks:
      - public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  drawio:
    image: jgraph/drawio:latest
    restart: unless-stopped
    networks:
      - public
    environment:
      - DRAWIO_CORS_ORIGINS=http://${DOMAIN_NAME}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=irboard_public"
      - "traefik.http.routers.drawio.rule=Host(`${DRAWIO_DOMAIN}`)"
      - "traefik.http.routers.drawio.entrypoints=web"
      - "traefik.http.routers.drawio.service=drawio-svc"
      - "traefik.http.services.drawio-svc.loadbalancer.server.port=8080"

  # --- MAIL SERVER ---
  smtp-server:
    image: axllent/mailpit:v1.29
    ports:
      - "8025:8025" 
      - "25:1025" 
    networks:
      - internal

  # smtp-server:
  #   image: boky/postfix
  #   environment:
  #     - ALLOWED_SENDER_DOMAINS=${DOMAIN_NAME}
  #     - POSTFIX_myhostname=mail.${DOMAIN_NAME}
  #     - POSTFIX_myorigin=${DOMAIN_NAME}
  #     - POSTFIX_mynetworks=127.0.0.0/8,172.16.0.0/12
  #     - POSTFIX_mydestination=localhost
  #     - POSTFIX_message_size_limit=0
  #     - POSTFIX_smtp_tls_security_level=none
  #     - POSTFIX_smtpd_tls_security_level=none
  #     - POSTFIX_always_add_missing_headers=yes
  #     - DKIM_AUTOGENERATE=true
  #   networks:
  #     - internal

  # --- OBSERVABILITY ---
  grafana:
    image: grafana/grafana:12.3.5
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=http://grafana.${DOMAIN_NAME}
      - GF_LIVE_ALLOWED_ORIGINS=http://grafana.${DOMAIN_NAME}
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - public
      - internal # serious network hardening is beyond the scope of this tfg
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=irboard_public"

      # Router
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN_NAME}`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.routers.grafana.service=grafana-svc"

      # Service (Grafana listens on 3000 internally)
      - "traefik.http.services.grafana-svc.loadbalancer.server.port=3000"
  
  
  loki:
    image: grafana/loki:3.5.12
    networks:
      - internal

  promtail:
    image: grafana/promtail:3.5.12
    container_name: promtail
    user: root # Possible threat, but added as hardening the project's observability is beyond the project's scope
    volumes:
      - ./config/promtail/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - internal
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    volumes:
      - ./config/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
    networks:
      - internal

volumes: # [PROD] remove volumes in production
  db_data_kratos:
  db_data_keto:
  db_data_rms:
  minio_data: