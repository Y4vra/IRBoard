networks:
  public:
    driver: bridge
  internal:
    driver: bridge

services:
  # --- GATEWAY ---
  traefik:
    image: traefik:v2.10
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080" # Dashboard de Traefik
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - public

  # --- MIGRATION (PREPARE ORY TABLES) ---
  keto-migrate:
    image: oryd/keto:latest
    depends_on:
      keto-db:
        condition: service_healthy
    environment:
      - DSN=postgres://${KETO_DB_USER}:${KETO_DB_PASSWORD}@keto-db:5432/${KETO_DB_NAME}?sslmode=disable
    volumes:
      - ./config/keto:/etc/config/keto
    command: -c /etc/config/keto/keto.yaml migrate up --yes
    networks:
      - internal
  kratos-migrate:
    image: oryd/kratos:latest
    environment:
      - DSN=postgres://${KRATOS_DB_USER}:${KRATOS_DB_PASSWORD}@kratos-db:5432/${KRATOS_DB_NAME}?sslmode=disable
    volumes:
      - ./config/kratos:/etc/config/kratos
    command: -c /etc/config/kratos/kratos.yaml migrate sql -e --yes
    depends_on:
      kratos-db:
        condition: service_healthy
    networks:
      - internal

  # --- IDENTITY (ORY) ---
  kratos-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${KRATOS_DB_USER}
      - POSTGRES_PASSWORD=${KRATOS_DB_PASSWORD}
      - POSTGRES_DB=${KRATOS_DB_NAME}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KRATOS_DB_USER} -d ${KRATOS_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db_data_kratos:/var/lib/postgresql/data
  keto-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${KETO_DB_USER}
      - POSTGRES_PASSWORD=${KETO_DB_PASSWORD}
      - POSTGRES_DB=${KETO_DB_NAME}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KETO_DB_USER} -d ${KETO_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db_data_keto:/var/lib/postgresql/data

  kratos:
    image: oryd/kratos:latest
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
      kratos-db:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    environment:
      - DSN=postgres://${KRATOS_DB_USER}:${KRATOS_DB_PASSWORD}@kratos-db:5432/${KRATOS_DB_NAME}?sslmode=disable
      - SERVE_PUBLIC_BASE_URL=http://${AUTH_DOMAIN}/
      - SERVE_ADMIN_BASE_URL=http://kratos:4434/
      - SERVE_PUBLIC_CORS_ALLOWED_ORIGINS=http://${DOMAIN_NAME}
      - SELFSERVICE_ALLOWED_RETURN_URLS=http://${DOMAIN_NAME}
      - SELFSERVICE_DEFAULT_BROWSER_RETURN_URL=http://${DOMAIN_NAME}/dashboard
      - SELFSERVICE_FLOWS_ERROR_UI_URL=http://${DOMAIN_NAME}/error
      - SELFSERVICE_FLOWS_LOGIN_UI_URL=http://${DOMAIN_NAME}/login
      - SELFSERVICE_FLOWS_REGISTRATION_UI_URL=http://${DOMAIN_NAME}/registration
      - SELFSERVICE_FLOWS_SETTINGS_UI_URL=http://${DOMAIN_NAME}/settings
      - SELFSERVICE_FLOWS_RECOVERY_UI_URL=http://${DOMAIN_NAME}/setup-password
    volumes:
      - ./config/kratos:/etc/config/kratos
    command: serve -c /etc/config/kratos/kratos.yaml --watch-courier
    networks:
      - internal

  keto:
    image: oryd/keto:latest
    depends_on:
      keto-migrate:
        condition: service_completed_successfully
      keto-db:
        condition: service_healthy
    environment:
      - DSN=postgres://${KETO_DB_USER}:${KETO_DB_PASSWORD}@keto-db:5432/${KETO_DB_NAME}?sslmode=disable
    volumes:
      - ./config/keto:/etc/config/keto
    command: serve -c /etc/config/keto/keto.yaml
    networks:
      - internal

  oathkeeper:
    image: oryd/oathkeeper:latest
    depends_on:
      - kratos
      - keto
    volumes:
      - ./config/oathkeeper:/etc/config/oathkeeper
    command: serve proxy -c /etc/config/oathkeeper/oathkeeper.yaml
    networks:
      - public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oathkeeper.rule=Host(`${AUTH_DOMAIN}`) || Host(`${API_DOMAIN}`) || Host(`grafana.${DOMAIN_NAME}`)"
      - "traefik.http.services.oathkeeper.loadbalancer.server.port=4455"

  # --- DEVELOPMENT ONLY, INSERTS ADMIN USER FOR FIRST TIME USE ---
  initial-setup-admin:
    image: alpine:latest
    depends_on:
      kratos:
        condition: service_started
      keto:
        condition: service_started
    networks:
      - internal
    environment:
      - KRATOS_URL=http://kratos:4434/admin/identities
      - KETO_URL=http://keto:4467/admin/relation-tuples
    entrypoint: /bin/sh -c
    command:
      - | 
        apk add --no-cache curl jq
        sleep 10;
        echo '
        {
          "schema_id": "default",
          "traits": {
            "email": "admin@irboard.com",
            "name": "Admin",
            "surname": "System",
            "is_admin": true
          },
          "credentials": {
            "password": {
              "config": {
                "password": "15_char_admin_password"
              }
            }
          }
        }' > ./file.json
        USER_ID=$(curl -X POST $$KRATOS_URL -H "Content-Type: application/json" -d @file.json | jq -r '.id')
        echo 'user id:\n'
        if [ "$$USER_ID" != "null" ]; then
          curl -X PUT $$KETO_URL \
            -H "Content-Type: application/json" \
            -d "{
              \"namespace\": \"User\",
              \"object\": \"System\",
              \"relation\": \"admin\",
              \"subject_id\": \"$$USER_ID\"
            }"
          echo "Usuario admin configurado con éxito."
        else
          echo "Error: No se pudo obtener el ID de Kratos."
        fi

  # --- BUSINESS LOGIC ---
  rms-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${RMS_DB_USER}
      - POSTGRES_PASSWORD=${RMS_DB_PASSWORD}
      - POSTGRES_DB=${RMS_DB_NAME}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RMS_DB_USER} -d ${RMS_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
    - db_data_rms:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      rms-db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://rms-db:5432/${RMS_DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${RMS_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${RMS_DB_PASSWORD}
    networks:
      - internal

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_DOMAIN_NAME=${DOMAIN_NAME}
    networks:
      - public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=5173"

  # --- MAIL SERVER ---
  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025" 
      - "1025:1025" 
    networks:
      - internal

  # --- OBSERVABILITY ---
  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - internal
  
  
  loki:
    image: grafana/loki:latest
    networks:
      - internal

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    user: root # Possible threat, but added as hardening the project's observability is beyond the project's scope
    volumes:
      - ./config/promtail/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - internal
    depends_on:
      - loki

volumes:
  db_data_kratos:
  db_data_keto:
  db_data_rms: